name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          pip install langchain langchain-community langchain-core chromadb \
                      sentence-transformers pypdf python-docx beautifulsoup4 \
                      requests tiktoken pydantic python-dotenv plotly pandas numpy

      - name: Lint with flake8
        run: |
          flake8 app/ tests/ --max-line-length=110 --ignore=E501,W503

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t cyberrag:test .
