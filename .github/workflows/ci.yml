name: CI — Lint & Test
 
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
 
    steps:
      - uses: actions/checkout@v4.2.2
 
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
 
      - name: Cache pip
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
 
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          pip install langchain langchain-community langchain-core langchain-text-splitters \
                      chromadb sentence-transformers pypdf python-docx beautifulsoup4 \
                      requests tiktoken pydantic python-dotenv plotly pandas numpy
 
      - name: Lint with flake8
        run: |
          flake8 app/ tests/ --max-line-length=110 --ignore=E501,W503
 
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
 
  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Build Docker image
        run: docker build -t cyberrag:test .
 